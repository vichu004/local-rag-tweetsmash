version: '3.8'

services:
  rag-server:
    build: .
    image: local-rag
    container_name: local-rag
    network_mode: "host"
    environment:
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      - CHROMA_URL=http://127.0.0.1:8000
    depends_on:
      - chroma
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    network_mode: "host"
    volumes:
      - ./chroma_data:/chroma/chroma
    restart: unless-stopped
